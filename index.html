<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Torch — Free, open-source token info for Solana</title>
    <meta
      name="description"
      content="Torch is the free, open-source alternative to Dexscreener's $299 paywall. Verify on-chain (dev wallet or ≥3% holder), then update your Solana token's banner, description and links — for free. Open API for any trading platform."
    />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0f14" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph / social share -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Torch" />
    <meta property="og:title" content="Torch — Free, open-source token info for Solana" />
    <meta
      property="og:description"
      content="The free, open-source alternative to Dexscreener's $299 paywall. Verify on-chain and update your Solana token info for free. Burn the paywall."
    />
    <meta property="og:image" content="/og.png" />
    <meta property="og:url" content="https://torch-sable.vercel.app/" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Torch — Free, open-source token info for Solana" />
    <meta
      name="twitter:description"
      content="The free, open-source alternative to Dexscreener's $299 paywall. Verify on-chain and update your Solana token info for free."
    />
    <meta name="twitter:image" content="/og.png" />
    <!-- Modern type system: Inter (UI), Space Grotesk (display), JetBrains Mono (numbers/addresses). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <!-- Apply the saved/system theme before paint to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("dux.theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          if (theme === "dark") document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
